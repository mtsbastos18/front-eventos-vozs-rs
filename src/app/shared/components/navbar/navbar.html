<nav class="bg-green-600 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 cursor-pointer" routerLink="/">
                <span class="font-bold text-xl">EventosHub</span>
            </div>
            <div class="flex items-center space-x-4">
                <a routerLink="/" class="hover:text-indigo-200 font-medium">Eventos</a>

                <ng-container *ngIf="authService.currentUser$ | async as user; else unauth">
                    <a routerLink="/admin/dashboard" class="hover:text-indigo-200 font-medium">Dashboard</a>
                    <a routerLink="/admin/events" class="hover:text-indigo-200 font-medium">Gerenciar</a>
                    <span class="ml-4 text-sm text-indigo-200">Olá, {{ user.name }}</span>
                    <button (click)="logout()"
                        class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1 rounded text-sm font-medium">
                        Sair
                    </button>
                </ng-container>

                <ng-template #unauth>
                    <a routerLink="/login"
                        class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1 rounded text-sm font-medium">
                        Área Restrita
                    </a>
                </ng-template>
            </div>
        </div>
    </div>
</nav>
