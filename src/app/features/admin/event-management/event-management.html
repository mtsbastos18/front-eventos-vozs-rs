<app-navbar></app-navbar>

<div class="min-h-screen bg-gray-100 py-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Gerenciar Eventos</h1>
            <button (click)="openCreateForm()"
                class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 focus:outline-none">
                Novo Evento
            </button>
        </div>

        <!-- Modal Form -->
        <div *ngIf="showForm"
            class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50 px-4">
            <div class="bg-white rounded-lg shadow-xl w-full max-w-lg overflow-hidden">
                <div class="px-6 py-4 bg-indigo-600 text-white flex justify-between items-center">
                    <h3 class="text-lg font-semibold">{{ isEditing ? 'Editar Evento' : 'Criar Evento' }}</h3>
                    <button (click)="closeForm()" class="text-white hover:text-indigo-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <form [formGroup]="eventForm" (ngSubmit)="onSubmit()" class="px-6 py-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
                        <input type="text" formControlName="name"
                            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                        <textarea formControlName="description" rows="3"
                            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Data e Hora</label>
                            <input type="datetime-local" formControlName="date"
                                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Capacidade</label>
                            <input type="number" formControlName="capacity"
                                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Local</label>
                        <input type="text" formControlName="location"
                            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>

                    <div class="pt-4 flex justify-end space-x-3">
                        <button type="button" (click)="closeForm()"
                            class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50 focus:outline-none">Cancelar</button>
                        <button type="submit" [disabled]="eventForm.invalid || isSubmitting"
                            class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 focus:outline-none disabled:bg-indigo-400">
                            {{ isSubmitting ? 'Salvando...' : 'Salvar' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <div *ngIf="isLoading" class="flex justify-center p-10">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
            </div>

            <table *ngIf="!isLoading" class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Evento</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Capacidade</th>
                        <th scope="col"
                            class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Ações</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr *ngFor="let event of events">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="font-medium text-gray-900">{{ event.name }}</div>
                            <div class="text-sm text-gray-500">{{ event.location }}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            {{ event.date | date:'dd/MM/yyyy HH:mm' }}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            {{ event.registeredCount || 0 }} / {{ event.capacity }}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-3">
                            <a [routerLink]="['/admin/events', event.id, 'participants']"
                                class="text-green-600 hover:text-green-900">Inscritos</a>
                            <button (click)="openEditForm(event)"
                                class="text-indigo-600 hover:text-indigo-900">Editar</button>
                            <button (click)="deleteEvent(event.id)"
                                class="text-red-600 hover:text-red-900">Excluir</button>
                        </td>
                    </tr>
                    <tr *ngIf="events.length === 0">
                        <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">Nenhum evento encontrado.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
