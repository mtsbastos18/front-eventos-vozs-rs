<app-navbar></app-navbar>

<!-- Banner Superior -->
<div *ngIf="!isLoading && event" class="w-full h-64 md:h-80 lg:h-96 bg-gray-200 relative overflow-hidden">
    <img [src]="event.image_path ? storageUrl + event.image_path : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80'"
        alt="Banner do evento passado" class="w-full h-full object-cover opacity-90">
</div>

<div class="min-h-screen bg-gray-50 py-10">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="mb-6">
            <a routerLink="/"
                class="text-green-600 hover:text-green-900 flex items-center text-sm font-medium transition-colors">
                &larr; Voltar para Eventos
            </a>
        </div>

        <div *ngIf="isLoading" class="flex justify-center my-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"></div>
        </div>

        <div *ngIf="error" class="bg-red-100 text-red-700 p-4 rounded text-center max-w-2xl mx-auto shadow-sm">
            {{ error }}
        </div>



        <div *ngIf="!isLoading && event" class="space-y-10">

            <!-- Informações Gerais e Descrição -->
            <div class="bg-white rounded-lg shadow-md p-8">
                <h1 class="text-4xl font-extrabold text-gray-900 mb-2">{{ event.title }}</h1>
                <h2 *ngIf="event.subtitle" class="text-xl font-medium text-gray-600 mb-6">{{ event.subtitle }}</h2>

                <div class="flex flex-wrap gap-6 text-sm text-gray-500 mb-8 border-b border-gray-100 pb-6">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 mr-2 shrink-0 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        {{ event.date | date:'dd/MM/yyyy - EEEE':'UTC' }}
                    </div>
                    <div class="flex items-center">
                        <svg class="w-5 h-5 mr-2 shrink-0 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        {{ event.date | date:'HH:mm':'UTC' }}
                    </div>
                    <div class="flex items-center">
                        <svg class="w-5 h-5 mr-2 shrink-0 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        {{ event.location }}
                    </div>
                </div>

                <div class="w-full mb-8">
                    <div class="article-image-text">
                        <h2 *ngIf="!postEventData" class="text-2xl font-bold text-gray-900 mb-4">
                            {{"Em breve..."}}
                        </h2>
                        <div *ngIf="postEventData" class="text-gray-700 leading-relaxed ql-editor p-0">
                            <img [src]="galleryImages[0]" alt="Registro do evento" class="article-float-img" />

                            <span [innerHTML]="cleanDescription(postEventData?.description) | safeHtml"></span>
                        </div>
                    </div>
                </div>
                <ng-container *ngIf="galleryImages && galleryImages.length > 0">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-4 max-h-96 overflow-y-auto gallery-scroll">
                        <div *ngFor="let img of galleryImages"
                            class="rounded-lg overflow-hidden shadow border border-gray-100 cursor-pointer"
                            (click)="openImageModal(img)">
                            <img [src]="img" alt="Registro do evento"
                                class="w-full h-40 md:h-48 object-cover hover:scale-105 transition-transform duration-500">
                        </div>
                    </div>
                    <!-- Modal de Imagem Ampliada -->
                    <div *ngIf="showImageModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70">
                        <div class="relative max-w-3xl w-full mx-4">
                            <button (click)="closeImageModal()"
                                class="absolute top-2 right-2 text-white text-3xl font-bold z-10">&times;</button>
                            <img [src]="modalImageUrl" alt="Imagem ampliada"
                                class="w-full max-h-[80vh] rounded-lg shadow-2xl object-contain bg-white">
                        </div>
                    </div>
                </ng-container>
            </div>

            <!-- Vídeo Integrado -->
            <div *ngIf="videoUrl != null" class="bg-white rounded-lg shadow-md p-8">
                <h3 class="text-2xl font-bold text-gray-900 mb-6">Assista aos melhores momentos</h3>
                <div class="w-full rounded-lg overflow-hidden bg-white shadow-inner">
                    <!-- Proporção 16:9 responsiva com altura adaptável -->
                    <video [src]="videoUrl" class="w-full" controls></video>
                </div>
            </div>

            <!-- Carrossel de Fotos -->
            <!-- <div *ngIf="galleryImages && galleryImages.length > 0" class="bg-white rounded-lg shadow-md p-8">
                <h3 class="text-2xl font-bold text-gray-900 mb-6">Galeria de Fotos</h3>

                <div class="flex overflow-x-auto gap-4 pb-4 snap-x snap-mandatory hide-scrollbar">
                    <div *ngFor="let img of galleryImages"
                        class="snap-center shrink-0 w-72 md:w-96 rounded-lg overflow-hidden shadow border border-gray-100 cursor-pointer">
                        <img [src]="img" alt="Registro do evento"
                            class="w-full h-56 md:h-64 object-cover hover:scale-105 transition-transform duration-500">
                    </div>
                </div>
            </div> -->

        </div>
    </div>
</div>
